<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>One True Infotainment</title>

  <style>
    :root {
      --oti-blue: #061f3f;
      --oti-red: #b80016;
      --oti-muted: #5d6875;
      --oti-line: #d7dce3;
      --oti-bg: #f4f6f9;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      background: var(--oti-bg);
      font-family: Arial, Helvetica, sans-serif;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .site-header {
      background: #000;
      border-bottom: 4px solid var(--oti-red);
    }

    .banner img {
      width: 100%;
      height: clamp(150px, 24vw, 360px);
      object-fit: cover;
    }

    .page-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 28px auto;
      display: grid;
      grid-template-columns: minmax(0,1fr) 300px;
      gap: 28px;
    }

    .lead-link {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      text-decoration: none;
      color: inherit;
    }

    .lead-image-wrap,
    .story-image-wrap {
      position: relative;
      overflow: hidden;
      background: #111;
    }

    .lead-image-wrap { aspect-ratio: 16/9; }
    .story-image-wrap { aspect-ratio: 16/10; }

    .lead-image-wrap img,
    .story-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .label {
      position: absolute;
      left: 10px;
      bottom: 10px;
      background: rgba(6,31,63,0.9);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 900;
      padding: 6px 8px;
      text-transform: uppercase;
    }

    .story-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 18px;
      margin-top: 20px;
    }

    .story-card a {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .story-card h2 {
      font-size: 1.1rem;
      margin: 8px 0 4px;
      font-weight: 900;
      color: var(--oti-blue);
    }

    .story-card p {
      font-size: 0.9rem;
      color: var(--oti-muted);
      margin: 0;
    }

    .ad-rail {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .ad-unit {
      background: #fff;
      border: 1px solid var(--oti-line);
      padding: 10px;
    }

    .mobile-ads {
      display: none;
      max-width: 360px;
      margin: 28px auto 0;
      padding-top: 18px;
      border-top: 2px solid var(--oti-line);
    }

    .ad-label {
      font-size: 0.75rem;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 14px;
      color: var(--oti-muted);
    }

    @media (max-width: 980px) {
      .page-shell { grid-template-columns: 1fr; }
      .ad-rail { display: none; }
      .mobile-ads { display: block; }
      .lead-link { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .story-grid { grid-template-columns: 1fr; }
    }

    .disclaimer-bar {
      text-align: center;
      padding: 10px;
      font-size: 0.75rem;
      color: var(--oti-muted);
      border-top: 1px solid var(--oti-line);
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="banner">
    <img src="assets/otinewbanner.png" />
  </div>
</header>

<main class="page-shell">

<section>

<a href="jokethreat.html" class="lead-link">
  <div class="lead-image-wrap">
    <img src="assets/jokebrief.jpg" />
  </div>
  <div>
    <h1>Nation’s Jokes Officially Upgraded to Ballistic Weapons</h1>
  </div>
</a>

<section class="story-grid">

  <!-- ALL 6 STORIES -->

  <!-- (kingcharles, ballroom, warmodel, oiltruth, goatyoga, kidstrait — as provided previously) -->

</section>

<section class="mobile-ads">
  <div class="ad-label">Patriotic Sponsors</div>

  <div class="ad-unit">
    <img src="assets/jokeshield.jpg" />
  </div>

  <div class="ad-unit">
    <img src="assets/bigjesus.jpg" />
  </div>
</section>

</section>

<aside class="ad-rail">
  <div class="ad-unit">
    <img src="assets/jokeshield.jpg" />

  <div class="ad-unit">

</main>

<footer class="disclaimer-bar">

</body>
</html>
