  <style>
    :root {
      --oti-blue: #061f3f;
      --oti-red: #b80016;
      --oti-ink: #071629;
      --oti-muted: #5d6875;
      --oti-line: #d7dce3;
      --oti-bg: #f4f6f9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--oti-bg);
      color: var(--oti-ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    .site-header {
      background: #000;
      border-bottom: 4px solid var(--oti-red);
    }

    .banner {
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
    }

    .banner img {
      width: 100%;
      height: clamp(150px, 24vw, 360px);
      object-fit: cover;
      display: block;
    }

    .page-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 28px auto 56px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 28px;
    }

    .lead-story {
      padding-bottom: 24px;
      border-bottom: 1px solid var(--oti-line);
    }

    .lead-link {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 22px;
      text-decoration: none;
      color: inherit;
    }

    .lead-image-wrap,
    .story-image-wrap {
      position: relative;
      overflow: hidden;
      background: #111;
    }

    .lead-image-wrap { aspect-ratio: 16 / 9; }
    .story-image-wrap { aspect-ratio: 16 / 10; }

    .lead-image-wrap img,
    .story-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .label {
      position: absolute;
      left: 12px;
      bottom: 12px;
      background: rgba(6, 31, 63, 0.94);
      color: #fff;
      padding: 8px 11px;
      font-size: 0.8rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .lead-copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 600px;
    }

    .lead-kicker {
      color: var(--oti-red);
      font-size: 0.78rem;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .lead-copy h1 {
      margin: 0 0 12px;
      color: var(--oti-blue);
      font-size: clamp(1.8rem, 3.2vw, 3.2rem);
      line-height: 1.02;
      letter-spacing: -0.03em;
      font-weight: 900;
    }

    .lead-copy p {
      margin: 0;
      color: var(--oti-muted);
      font-size: 1rem;
      line-height: 1.4;
      font-weight: 700;
      max-width: 520px;
    }

    .story-grid {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px 18px;
    }

    .story-card {
      border-bottom: 1px solid var(--oti-line);
      padding-bottom: 18px;
    }

    .story-card a {
      text-decoration: none;
      color: inherit;
    }

    .story-card h2 {
      margin: 10px 0 6px;
      color: var(--oti-blue);
      font-size: 1.15rem;
      font-weight: 900;
    }

    .story-card p {
      margin: 0;
      color: var(--oti-muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .ad-rail {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .ad-unit {
      background: #fff;
      border: 1px solid var(--oti-line);
      padding: 10px;
    }

    .ad-unit img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .ad-unit.big-jesus img {
      transform: scale(1.02);
    }

    /* MOBILE ADS */
    .mobile-ads {
      display: none;
      margin-top: 28px;
      padding-top: 18px;
      border-top: 2px solid var(--oti-line);
    }

    .ad-label {
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--oti-muted);
      margin-bottom: 14px;
    }

    .mobile-ads .ad-unit {
      margin-bottom: 16px;
    }

    @media (max-width: 980px) {
      .page-shell { grid-template-columns: 1fr; }

      .ad-rail { display: none; }

      .mobile-ads { display: block; }

      .lead-link { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .story-grid { grid-template-columns: 1fr; }
      .banner img { height: clamp(110px, 34vw, 190px); }
    }
  </style>
</head>

<header class="site-header">

        <div class="lead-copy">

          <p>Federal regulators reclassify humor as a measurable threat.</p>
        </div>

      </a>
    </article>

    <section class="story-grid">
      <!-- existing 4 story tiles unchanged -->
    </section>

    <!-- MOBILE ADS -->
    <section class="mobile-ads">
      <div class="ad-label">Patriotic Sponsors</div>

      <div class="ad-unit">
        <img src="assets/jokeshield.jpg" alt="JokeShield Home Defense System" />
      </div>

      <div class="ad-unit big-jesus">
        <img src="assets/bigjesus.jpg" alt="Patriotic Church of Big Jesus" />
      </div>
    </section>

  </section>

  <aside class="ad-rail">
    <div class="ad-unit">
      <img src="assets/jokeshield.jpg" />
    </div>

    <div class="ad-unit big-jesus">
      <img src="assets/bigjesus.jpg" />
    </div>
  </aside>

</main>

</body>
</html>
