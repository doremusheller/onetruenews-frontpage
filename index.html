<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>One True Infotainment</title>

  <meta property="og:type" content="website" />
  <meta property="og:title" content="One True Infotainment" />
  <meta property="og:description" content="News. Narrative. Nation." />
  <meta property="og:image" content="https://www.onetrueinfotainment.com/assets/otinewbanner.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="One True Infotainment" />
  <meta name="twitter:description" content="News. Narrative. Nation." />
  <meta name="twitter:image" content="https://www.onetrueinfotainment.com/assets/otinewbanner.png" />

  <style>
    :root {
      --oti-blue: #061f3f;
      --oti-red: #b80016;
      --oti-gold: #d7a737;
      --oti-ink: #071629;
      --oti-muted: #5d6875;
      --oti-line: #d7dce3;
      --oti-bg: #f4f6f9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--oti-bg);
      color: var(--oti-ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    .site-header {
      background: #000;
      border-bottom: 4px solid var(--oti-red);
    }

    .banner {
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
    }

    .banner img {
      width: 100%;
      height: clamp(150px, 24vw, 360px);
      display: block;
      object-fit: cover;
      object-position: center;
    }

    .page-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 28px auto 56px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 28px;
      align-items: start;
    }

    .lead-story {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 22px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--oti-line);
    }

    .lead-story a {
      color: inherit;
      text-decoration: none;
      display: block;
    }

    .lead-image-wrap {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #111;
    }

    .lead-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .label {
      position: absolute;
      left: 12px;
      bottom: 12px;
      background: rgba(6, 31, 63, 0.94);
      color: #fff;
      padding: 8px 11px;
      font-size: 0.8rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .lead-kicker {
      color: var(--oti-red);
      font-size: 0.78rem;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .lead-copy h1 {
      margin: 0 0 12px;
      color: var(--oti-blue);
      font-size: clamp(2.1rem, 4vw, 4rem);
      font-weight: 900;
    }

    .lead-copy p {
      margin: 0;
      color: var(--oti-muted);
      font-weight: 700;
    }

    .ad-rail {
      min-height: 680px;
      padding: 18px;
      background: #fff;
      border: 1px solid var(--oti-line);
      text-align: center;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="banner">
    <img src="assets/otinewbanner.png" />
  </div>
</header>

<main class="page-shell">

  <section>

    <article class="lead-story">
      <a href="jokethreat.html">
        <div class="lead-image-wrap">
          <img src="assets/jokebrief.jpg" />
          <span class="label">National Security</span>
        </div>
      </a>

      <a href="jokethreat.html" class="lead-copy">
        <div class="lead-kicker">Breaking</div>
        <h1>Nation’s Jokes Officially Upgraded to Ballistic Weapons</h1>
        <p>Federal regulators reclassify humor as a measurable threat, introducing new systems to track, contain, and neutralize high-risk punchlines.</p>
      </a>
    </article>

  </section>

  <aside class="ad-rail">
    Ad Space
  </aside>

</main>

</body>
</html>
