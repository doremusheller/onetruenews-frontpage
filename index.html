<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>One True Infotainment</title>

  <script src="ads.js"></script>

  <style>
    :root {
      --oti-blue: #061f3f;
      --oti-red: #b80016;
      --oti-muted: #5d6875;
      --oti-line: #d7dce3;
      --oti-bg: #f4f6f9;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      background: var(--oti-bg);
      font-family: Arial, Helvetica, sans-serif;
      color: #071629;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .site-header {
      background: #000;
      border-bottom: 4px solid var(--oti-red);
    }

    .banner img {
      width: 100%;
      height: clamp(150px, 24vw, 360px);
      object-fit: cover;
    }

    .page-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 28px auto 56px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 28px;
    }

    .lead-story {
      padding-bottom: 24px;
      border-bottom: 1px solid var(--oti-line);
    }

    .lead-link {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 20px;
      text-decoration: none;
      color: inherit;
    }

    .lead-image-wrap,
    .story-image-wrap {
      position: relative;
      overflow: hidden;
      background: #111;
    }

    .lead-image-wrap { aspect-ratio: 16 / 9; }
    .story-image-wrap { aspect-ratio: 16 / 10; }

    .lead-image-wrap img,
    .story-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .label {
      position: absolute;
      left: 10px;
      bottom: 10px;
      background: rgba(6,31,63,0.9);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 900;
      padding: 6px 8px;
      text-transform: uppercase;
    }

    .lead-copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .lead-copy h1 {
      margin: 0;
      color: var(--oti-blue);
      font-size: clamp(1.45rem, 2.1vw, 2.15rem);
      line-height: 1.02;
      letter-spacing: -0.025em;
      font-weight: 900;
      overflow-wrap: anywhere;
      text-wrap: balance;
    }

    .story-grid {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .story-card a {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .story-card h2 {
      margin: 8px 0 4px;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--oti-blue);
    }

    .story-card p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--oti-muted);
    }

    .ad-rail,
    .mobile-ad-rail {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .ad-unit {
      background: #fff;
      border: 1px solid var(--oti-line);
      padding: 10px;
    }

    .ad-unit img {
      width: 100%;
      max-width: 300px;
      margin: 0 auto;
    }

    .mobile-ads {
      display: none;
      max-width: 360px;
      margin: 28px auto 0;
      padding-top: 18px;
      border-top: 2px solid var(--oti-line);
    }

    .ad-label {
      font-size: 0.75rem;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 14px;
      color: var(--oti-muted);
    }

    @media (max-width: 980px) {
      .page-shell { grid-template-columns: 1fr; }
      .desktop-ad-rail { display: none; }
      .mobile-ads { display: block; }
      .lead-link { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .story-grid { grid-template-columns: 1fr; }

      .lead-copy h1 {
        font-size: clamp(1.55rem, 7vw, 2.35rem);
        line-height: 1.04;
      }
    }

    .disclaimer-bar {
      text-align: center;
      padding: 10px;
      font-size: 0.75rem;
      color: var(--oti-muted);
      border-top: 1px solid var(--oti-line);
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="banner">
    <img src="assets/otinewbanner.png" alt="One True Infotainment Banner" />
  </div>
</header>

<main class="page-shell">

<section>

<article class="lead-story">
<a href="hoodpope.html" class="lead-link">
  <div class="lead-image-wrap">
    <img src="assets/hoodpopetweet.jpg" alt="Trump Truth Social post about Pope Leo" />
    <span class="label">Religion</span>
  </div>
  <div class="lead-copy">
    <h1>Trump Blasts Pope Leo In Late-Night Truth Social Post</h1>
  </div>
</a>
</article>

<section class="story-grid">

  <!-- ALL story cards unchanged -->
  <!-- (same 10 including Harambe) -->

</section>

<section class="mobile-ads">
  <div class="ad-label">Patriotic Sponsors</div>
  <div class="mobile-ad-rail" data-random-ads></div>
</section>

</section>

<aside class="ad-rail desktop-ad-rail" data-random-ads></aside>

</main>

<footer class="disclaimer-bar">
  <p><em>It's likely or at least possible this is (still) satire. We strive to out-satire reality. We're losing.</em></p>
</footer>

<!-- RANDOMIZER SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  const grid = document.querySelector(".story-grid");
  if (!grid) return;

  const maxStories = 18;
  const cards = Array.from(grid.querySelectorAll(".story-card"));

  const shuffled = cards
    .map(card => ({ card, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(item => item.card)
    .slice(0, maxStories);

  grid.innerHTML = "";
  shuffled.forEach(card => grid.appendChild(card));
});
</script>

</body>
</html>
